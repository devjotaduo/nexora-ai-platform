name: Nexora Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "console/**"
      - "deploy/**"
      - "alembic/**"
      - "pyproject.toml"
      - "setup.py"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: latest)"
        required: false
        default: "latest"
        type: string

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ${{ github.repository_owner }}/nexora-platform
  ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ACR_IMAGE: leo-nexora-platform/nexora-platform

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Alibaba Cloud ACR
        if: ${{ secrets.ALIYUN_ACR_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Determine tags
        id: tags
        run: |
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +%Y%m%d)

          # GHCR tags (always)
          TAGS="${GHCR_REGISTRY}/${GHCR_IMAGE}:${TAG}"
          TAGS="${TAGS},${GHCR_REGISTRY}/${GHCR_IMAGE}:${DATE}-${SHORT_SHA}"

          # ACR tags (if credentials configured)
          if [ -n "${{ secrets.ALIYUN_ACR_USERNAME }}" ]; then
            TAGS="${TAGS},${ACR_REGISTRY}/${ACR_IMAGE}:${TAG}"
            TAGS="${TAGS},${ACR_REGISTRY}/${ACR_IMAGE}:${DATE}-${SHORT_SHA}"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            QWENPAW_DISABLED_CHANNELS=imessage
          cache-from: type=gha
          cache-to: type=gha,mode=max
