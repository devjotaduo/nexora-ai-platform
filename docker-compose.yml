volumes:
  nexora-data:
    name: nexora-data
  nexora-secrets:
    name: nexora-secrets
  nexora-backups:
    name: nexora-backups
  nexora-postgres:
    name: nexora-postgres

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexora-postgres
    restart: unless-stopped
    cpus: "${NEXORA_POSTGRES_CPUS:-1.0}"
    mem_limit: "${NEXORA_POSTGRES_MEMORY_LIMIT:-1g}"
    environment:
      POSTGRES_DB: "${NEXORA_POSTGRES_DB:-nexora}"
      POSTGRES_USER: "${NEXORA_POSTGRES_USER:-nexora}"
      POSTGRES_PASSWORD: "${NEXORA_POSTGRES_PASSWORD:-nexora_dev_password}"
    volumes:
      - nexora-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${NEXORA_POSTGRES_USER:-nexora} -d ${NEXORA_POSTGRES_DB:-nexora}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  nexora:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: nexora-platform:latest
    container_name: nexora-platform
    restart: unless-stopped
    cpus: "${NEXORA_APP_CPUS:-2.0}"
    mem_limit: "${NEXORA_APP_MEMORY_LIMIT:-4g}"
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      QWENPAW_AUTH_ENABLED: "true"
      QWENPAW_PORT: "8088"
      QWENPAW_WORKING_DIR: "/app/working"
      QWENPAW_SECRET_DIR: "/app/working.secret"
      QWENPAW_BACKUP_DIR: "/app/working.backups"
      QWENPAW_OPENAPI_DOCS: "false"
      NEXORA_MAX_ACTIVE_AGENTS: "${NEXORA_MAX_ACTIVE_AGENTS:-20}"
      NEXORA_AGENT_IDLE_TTL_SECONDS: "${NEXORA_AGENT_IDLE_TTL_SECONDS:-3600}"
      NEXORA_DB_URL: "postgresql+psycopg2://${NEXORA_POSTGRES_USER:-nexora}:${NEXORA_POSTGRES_PASSWORD:-nexora_dev_password}@postgres:5432/${NEXORA_POSTGRES_DB:-nexora}"
    volumes:
      - nexora-data:/app/working
      - nexora-secrets:/app/working.secret
      - nexora-backups:/app/working.backups
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/api/version', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
